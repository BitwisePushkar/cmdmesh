services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cmdmesh
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cmdmesh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmdmesh"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" 
      - "8025:8025"   

  backend:
    build: .
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started

  celery-worker:
    build: .
    restart: unless-stopped
    command: >
      celery -A backend.worker worker
      --loglevel=info
      --concurrency=4
      --queues=email,default
      --hostname=worker@%h
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-flower:
    build: .
    restart: unless-stopped
    command: >
      celery -A backend.worker flower
      --port=5555
      --basic_auth=admin:admin
    ports:
      - "5555:5555"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata: